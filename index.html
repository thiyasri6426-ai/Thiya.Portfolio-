<html lang="en">

    <title>A.Thiyasri | Spider-Verse Terminal</title>

    <style>
        :root {
            --radioactive-red: #ff1e3c;
            --web-blue: #00e1ff;
            --cyber-cyan: #00ffcc;
            --bg-dark: #060608;
            --pad-bg: rgba(12, 12, 18, 0.82);
            --text-main: #ffffff;
            --text-muted: #8e8e9a;
            --glow: 0 0 10px rgba(255, 30, 60, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; 
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.8rem; 
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* --- UPDATED: COMIC PANELS BACKDROP (FROM UPLOADED IMAGE) --- */
        .comic-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(6,6,8,0.92) 0%, rgba(12,12,18,0.96) 100%),
                        url('1000041198.jpg') no-repeat center center/cover;
            z-index: -2;
            opacity: 0.4;
        }

        /* --- BACKGROUND INTERACTIVE CANVAS --- */
        #web-matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* --- CUSTOM TARGET CURSOR --- */
        #spidey-cursor {
            width: 8px;
            height: 8px;
            background: var(--radioactive-red);
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px var(--radioactive-red);
            transition: transform 0.05s ease-out;
        }
        #spidey-cursor-ring {
            width: 24px;
            height: 24px;
            border: 1px dashed var(--web-blue);
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }

        /* --- UPDATED: NEW VIDEO PORTAL ENTRANCE SCREEN --- */
        #portal-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #portal-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: -2;
        }

        .portal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(6,6,8,0.6) 0%, rgba(6,6,8,0.95) 100%);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: -1;
        }
